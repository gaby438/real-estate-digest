  .edition-item:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .edition-date { font-size: 14px; font-weight: 600; color: var(--primary); }
  .edition-link { font-size: 12px; color: var(--accent); text-decoration: none; font-weight: 600; }
