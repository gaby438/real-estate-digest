  btn.textContent = label;
  btn.dataset.key = key;
  btn.onclick = () => {
    set.has(key) ? set.delete(key) : set.add(key);
    btn.classList.toggle('active');
    render();
  };
  document.getElementById(containerId).appendChild(btn);

allCompanies.forEach(c => mkBtn(c, selCompanies, c, 'companyFilters'));
allSources.forEach(s   => mkBtn(s, selSources, s, 'sourceFilters'));
allTypes.forEach(t     => mkBtn(TX_LABELS[t] || t, selTypes, t, 'typeFilters'));

// ─── tab bar ───────────────────────────────────────────────
const CATS = ['alle','wonen','logistiek','kantoren','retail','financiering','personeel','markt'];
CATS.forEach(cat => {
  const el = document.getElementById('cnt-' + cat);
  if (!el) return;
  const n = cat === 'alle' ? ARTICLES.length : ARTICLES.filter(a => a.categories.includes(cat)).length;
  el.textContent = n;
});

document.getElementById('tabBar').addEventListener('click', e => {
  const btn = e.target.closest('.tab-btn');
  if (!btn) return;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeTab = btn.dataset.cat;
  render();
});

// ─── search ────────────────────────────────────────────────
document.getElementById('searchBox').addEventListener('input', e => {
  query = e.target.value.trim().toLowerCase();
  render();
});

// ─── clear ─────────────────────────────────────────────────
document.getElementById('clearBtn').addEventListener('click', () => {
  selCompanies.clear(); selSources.clear(); selTypes.clear(); query = '';
  document.getElementById('searchBox').value = '';
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  render();
});

// ─── filter ────────────────────────────────────────────────
function filtered() {
  return ARTICLES.filter(a => {
    if (activeTab !== 'alle' && !a.categories.includes(activeTab)) return false;
    if (selCompanies.size > 0 && !a.companies.some(c => selCompanies.has(c))) return false;
    if (selSources.size   > 0 && !selSources.has(a.source))                   return false;
    if (selTypes.size     > 0 && !selTypes.has(a.transactionType))             return false;
    if (query) {
      const hay = [a.title, a.summary, ...a.companies, ...a.tags].join(' ').toLowerCase();
      if (!hay.includes(query)) return false;
    }
    return true;
  });
}

// ─── render ────────────────────────────────────────────────
function filterByCompany(e, co) {
  e.stopPropagation();
  const btn = document.querySelector(`#companyFilters [data-key="${CSS.escape(co)}"]`);
  if (btn) {
    selCompanies.has(co) ? selCompanies.delete(co) : selCompanies.add(co);
    btn.classList.toggle('active', selCompanies.has(co));
  } else {
    selCompanies.add(co);
  }
  render();
}

function cardHTML(a) {
  const coTags = a.companies.map(c =>
    `<span class="company-tag" onclick="filterByCompany(event,${JSON.stringify(c)})">${c}</span>`
  ).join('');
  const catTags = a.categories.map(c => `<span class="cat-tag">${c}</span>`).join('');
  return `
<div class="article-card ${a.isNew ? 'is-new' : ''}" onclick="window.open(${JSON.stringify(a.sourceUrl)},'_blank','noopener')">
  <div class="card-meta">
    ${a.isNew ? '<span class="new-pill">NIEUW</span>' : ''}
    <span class="source-badge">${a.source}</span>
    ${txBadge(a.transactionType)}
  </div>
  <a class="card-title" href="${a.sourceUrl}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${a.title}</a>
  <p class="card-summary">${a.summary}</p>
  <div class="card-footer">
    ${coTags}
    ${catTags}
    <a class="source-link" href="${a.sourceUrl}" target="_blank" rel="noopener" onclick="event.stopPropagation()">Lees meer →</a>
  </div>
</div>`;
}

function render() {
  const arts = filtered();
  const container = document.getElementById('articlesContainer');
  document.getElementById('resultText').textContent =
    `${arts.length} artikel${arts.length !== 1 ? 'en' : ''} gevonden`;

  if (!arts.length) {
    container.innerHTML = `<div class="empty-state"><h3>Geen artikelen gevonden</h3><p>Pas je filters of zoekopdracht aan om meer te zien.</p></div>`;
    return;
  }

  // group by date descending
  const byDate = {};
  arts.forEach(a => (byDate[a.date] = byDate[a.date] || []).push(a));
  const dates = Object.keys(byDate).sort((a,b) => b.localeCompare(a));

  container.innerHTML = dates.map(date => {
    const list = byDate[date];
    const anyNew = list.some(a => a.isNew);
    return `
<div class="day-group">
  <div class="day-header">
    <span class="day-label">${fmtDate(date)}</span>
    ${anyNew ? '<span class="day-new-pill">NIEUW</span>' : ''}
    <span class="day-line"></span>
    <span class="day-count">${list.length} artikel${list.length !== 1 ? 'en' : ''}</span>
  </div>
  ${list.map(cardHTML).join('')}
</div>`;
  }).join('');
}

render();
</script>
</body>
</html>
